  *{
    margin:0;

  :root{
    --primary:#2563eb;
    --dark:#0f172a;
    --light:#f8fafc;
  }

  body{
    background:var(--light);
    color:var(--dark);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* NAVBAR */
  nav{
    background:blue;

    justify-content:space-between;

  }

    list-style:none;
    display:flex;
    gap:20px;
  }
  body{
    background: rgb(65, 109, 82);
  }

  nav ul li a{
    color:rgb(249, 242, 242);
    text-decoration:none;
    font-weight:bold;
    font-size:15px;
  }

  nav ul li a:hover{
    opacity:0.8;
  }

  /* BODY */
  .content{
    flex:1;
    text-align:center;
    padding:60px 20px;
  }

  /* PROFILE */
  .profile img{
    width:140px;
    height:140px;
    border-radius:50%;
    border:3px solid var(--primary);
    margin-bottom:15px;
  }

  .content h1{
    margin-bottom:10px;
    color:var(--dark);
  }

  .content p{
    color:#555;
    font-size:16px;
    line-height:1.8;
    max-width:600px;
    margin:0 auto;
  }

  /* FOOTER */
  footer{
    background:var(--dark);
    color:white;
    text-align:center;
    padding:25px 15px;
  }

  footer p{
    margin:5px 0;
    font-size:14px;
  }
