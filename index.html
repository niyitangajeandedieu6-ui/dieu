<html>
<head>
<link rel="icon" type="image/png" href="logo.PNG">
<title>Contact</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
  }

  body{
    background:#151718;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }

  .contact-box{
    background:#2563eb;
    color:white;
    padding:40px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    width:90%;
    max-width:500px;
    transition:0.3s;
  }

  /* hover effect */
  .contact-box:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
  }

  .contact-box img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
    margin-bottom:15px;
  }

  .contact-box h1{
    margin-bottom:20px;
  }

  .contact-box p{
    margin:10px 0;
    font-size:16px;
    opacity:0.95;
  }

  /* links */
  .contact-box a{
    color:white;
    text-decoration:none;
    font-weight:bold;
  }

  .contact-box a:hover{
    text-decoration:underline;
  }
</style>
</head>

<body>

<div class="contact-box">

  <img src="dodieu.JPG" alt="profile">

  <h1>Contact Me</h1>

  <p>Email: <a href="mailto:niyitangajeandedieu@gmail.com">niyitangajeandedieu@gmail.com</a></p>
  <p>Phone: <a href="tel:+250793591625">+250 793591625</a></p>
  <p>Address: Mwendo, Kigali, Rwanda</p>
  <p>WhatsApp: <a href="https://wa.me/250793591625" target="_blank">Chat on WhatsApp</a></p>
  <p>Instagram: <a href="https://instagram.com/dodie_u109" target="_blank">dodie_u109</a></p>

</div>

</body>
</html>
